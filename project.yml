name: Clippo
options:
  bundleIdPrefix: com.clippo
  deploymentTarget:
    macOS: "12.0"
targets:
  Clippo:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - Resources/clippo-logo.icon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clippo.macos
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Clippo needs access to simulate paste operations to automatically paste clipboard content into other applications."
        INFOPLIST_KEY_NSHighResolutionCapable: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
